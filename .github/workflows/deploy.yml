name: Deploy production

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: production
  cancel-in-progress: false

jobs:
  deploy:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.head_branch == 'master')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment:
      name: production
      url: https://hot.kfxz.cn
    env:
      DEPLOY_HOST: ${{ vars.DEPLOY_HOST || secrets.DEPLOY_HOST }}
      DEPLOY_PORT: ${{ vars.DEPLOY_PORT || secrets.DEPLOY_PORT }}
      DEPLOY_USER: ${{ vars.DEPLOY_USER || secrets.DEPLOY_USER }}
      DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
      DEPLOY_KNOWN_HOSTS: ${{ vars.DEPLOY_KNOWN_HOSTS || secrets.DEPLOY_KNOWN_HOSTS }}
      APP_DIR: /www/wwwroot/hot.kfxz.cn
    steps:
      - name: Validate deployment secrets
        shell: bash
        run: |
          set -euo pipefail
          test -n "$DEPLOY_HOST"
          test -n "$DEPLOY_USER"
          test -n "$DEPLOY_SSH_KEY"

      - name: Checkout verified revision
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Configure SSH
        shell: bash
        run: |
          set -euo pipefail
          DEPLOY_PORT="${DEPLOY_PORT:-22}"
          install -m 700 -d ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          if [ -n "$DEPLOY_KNOWN_HOSTS" ]; then
            printf '%s\n' "$DEPLOY_KNOWN_HOSTS" > ~/.ssh/known_hosts
          else
            ssh-keyscan -p "$DEPLOY_PORT" -H "$DEPLOY_HOST" > ~/.ssh/known_hosts
          fi
          chmod 600 ~/.ssh/known_hosts

      - name: Create release archive
        shell: bash
        run: |
          set -euo pipefail
          tar \
            --exclude=.git \
            --exclude=.github \
            --exclude=.next \
            --exclude=node_modules \
            --exclude=coverage \
            --exclude=db \
            --exclude=tests \
            --exclude='*.log' \
            --exclude='.env*' \
            -czf /tmp/h2-hot2-release.tgz .

      - name: Upload and activate release
        shell: bash
        run: |
          set -euo pipefail
          DEPLOY_PORT="${DEPLOY_PORT:-22}"
          scp -P "$DEPLOY_PORT" /tmp/h2-hot2-release.tgz \
            "$DEPLOY_USER@$DEPLOY_HOST:/tmp/h2-hot2-${GITHUB_SHA}.tgz"
          ssh -p "$DEPLOY_PORT" "$DEPLOY_USER@$DEPLOY_HOST" \
            "APP_DIR='$APP_DIR' RELEASE_ARCHIVE='/tmp/h2-hot2-${GITHUB_SHA}.tgz' bash -s" \
            < scripts/deploy-production.sh

      - name: Verify public site
        shell: bash
        run: curl --fail --silent --show-error --retry 5 --retry-delay 3 https://hot.kfxz.cn/api/health >/dev/null
