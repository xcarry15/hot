name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint, typecheck, unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      DATABASE_URL: file:../db/ci.db
      API_TOKEN: ci-only-token
      NEXT_PUBLIC_SITE_URL: https://hot.kfxz.cn
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run db:generate
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test

  migrations:
    name: Migration smoke
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      DATABASE_URL: file:../db/ci-migrations.db
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run db:generate
      - run: npm run test:migrations

  build:
    name: Production build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      DATABASE_URL: file:../db/ci-build.db
      API_TOKEN: ci-only-token
      NEXT_PUBLIC_SITE_URL: https://hot.kfxz.cn
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run db:generate
      - run: npm run db:migrate:deploy
      - run: npm run build
